spring.application.name=rdas
# Redis
spring.data.redis.host=localhost
spring.data.redis.port=6379
spring.data.redis.password=
spring.data.redis.timeout=2000ms

# Cache
spring.cache.type=redis

# Circuit breaker
resilience4j.circuitbreaker.instances.soapService.sliding-window-size=10
resilience4j.circuitbreaker.instances.soapService.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.soapService.wait-duration-in-open-state=30s
resilience4j.circuitbreaker.instances.soapService.permitted-number-of-calls-in-half-open-state=3
resilience4j.circuitbreaker.instances.soapService.automatic-transition-from-open-to-half-open-enabled=true

# Retry
resilience4j.retry.instances.soapService.max-attempts=3
resilience4j.retry.instances.soapService.wait-duration=2s

# SOAP endpoint
soap.uri=http://webservices.oorsprong.org/websamples.countryinfo/CountryInfoService.wso